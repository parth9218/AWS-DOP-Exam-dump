<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS DOP-C02 Mock Exam</title>
    <meta name="description" content="Simulate the AWS Certified DevOps Engineer Professional DOP-C02 exam with timed questions, review flags, and detailed score summary.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
        (function(){
            var t = localStorage.getItem('mockExamTheme');
            if (t === 'light' || t === 'dark') {
                document.documentElement.setAttribute('data-theme', t);
            } else {
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        })();
    </script>
</head>
<body>
    <!-- ── LOADING SCREEN ── -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="aws-logo">☁️</div>
            <h1>AWS DOP-C02</h1>
            <p>Mock Exam Simulator</p>
            <div class="loading-bar"><div class="loading-fill"></div></div>
        </div>
    </div>

    <!-- ── EXAM SHELL ── -->
    <div id="exam-shell" class="exam-shell hidden">

        <!-- TOP NAV -->
        <header class="exam-header">
            <div class="header-left">
                <span class="exam-badge">AWS DOP-C02</span>
                <div class="timer-group">
                    <div id="timer-display" class="timer">⏱ --:--</div>
                    <button id="btn-clock-toggle" class="btn-icon" title="Hide clock">👁</button>
                </div>
            </div>
            <div class="header-center">
                <span id="nav-label" class="nav-label">Question <span id="current-q-num">1</span> of <span id="total-q-num">—</span></span>
            </div>
            <div class="header-right">
                <button id="btn-theme-toggle" class="btn-icon" title="Switch theme">🖥</button>
                <button id="btn-new-exam" class="btn-ghost btn-danger-ghost" title="Clear exam data and start fresh">🗑 New Exam</button>
                <button id="btn-quiz-summary" class="btn-primary-sm">Quiz Summary</button>
            </div>
        </header>

        <!-- QUESTION NAVIGATOR (scrollable pill strip) -->
        <div class="nav-strip-wrapper">
            <div id="question-navigator" class="question-navigator"></div>
        </div>

        <!-- LEGEND -->
        <div class="legend-bar">
            <span class="legend-item"><span class="pill-demo pill-answered"></span> Answered</span>
            <span class="legend-item"><span class="pill-demo pill-review"></span> For Review</span>
            <span class="legend-item"><span class="pill-demo pill-answered-review"></span> Answered + Review</span>
            <span class="legend-item"><span class="pill-demo pill-current"></span> Current</span>
        </div>

        <!-- QUESTION CARD -->
        <main class="question-area">
            <div id="question-card" class="question-card">
                <div class="question-meta-row">
                    <span id="q-number-badge" class="q-number-badge">Q1</span>
                    <span id="q-type-badge" class="q-type-badge">Single Answer</span>
                </div>
                <div id="question-text" class="question-text"></div>
                <div id="options-container" class="options-container"></div>
            </div>
        </main>

        <!-- BOTTOM BAR -->
        <footer class="exam-footer">
            <div class="footer-left">
                <button id="btn-flag" class="btn-flag">🚩 Flag for Review</button>
            </div>
            <div class="footer-center">
                <button id="btn-prev" class="btn-nav" disabled>← Prev</button>
                <button id="btn-next" class="btn-nav">Next →</button>
            </div>
            <div class="footer-right">
                <button id="btn-summary-footer" class="btn-primary-sm">Quiz Summary</button>
            </div>
        </footer>
    </div>

    <!-- ── SUMMARY OVERLAY ── -->
    <div id="summary-overlay" class="summary-overlay hidden">
        <div class="summary-modal">
            <div class="summary-header">
                <h2>📊 Quiz Summary</h2>
                <button id="btn-close-summary" class="btn-close">✕</button>
            </div>
            <div id="summary-score-row" class="summary-score-row"></div>
            <div id="summary-list" class="summary-list"></div>
            <div class="summary-actions">
                <button id="btn-new-exam-summary" class="btn-danger">🗑 Start New Exam</button>
                <button id="btn-close-summary-bottom" class="btn-ghost-white">Continue Exam</button>
            </div>
        </div>
    </div>

    <!-- ── CONFIRM DIALOG ── -->
    <div id="confirm-overlay" class="confirm-overlay hidden">
        <div class="confirm-modal">
            <h3>⚠️ Start New Exam?</h3>
            <p>This will permanently erase all your current progress and answers. This action cannot be undone.</p>
            <div class="confirm-actions">
                <button id="btn-confirm-yes" class="btn-danger">Yes, Start Fresh</button>
                <button id="btn-confirm-no" class="btn-ghost-white">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
